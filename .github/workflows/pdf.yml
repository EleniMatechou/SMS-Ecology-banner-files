name: Build PDF

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser

      - name: Generate PDF
        run: |
          chromium-browser \
          --headless \
          --disable-gpu \
          --print-to-pdf=banner.pdf \
          --virtual-time-budget=5000 \
          index.html

                - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: banner-pdf
          path: banner.pdf
