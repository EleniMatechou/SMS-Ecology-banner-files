name: Export PDF
on:
  push:
    branches: [main]
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install puppeteer
      - name: Screenshot banner
        run: |
          cat > capture.js << 'JSEOF'
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({args: ['--no-sandbox', '--disable-setuid-sandbox']});
            const page = await browser.newPage();
            await page.setViewport({width: 780, height: 1800, deviceScaleFactor: 3});
            await page.goto('file://' + process.cwd() + '/index.html', {waitUntil: 'networkidle2'});
            await page.evaluate(() => {
              document.body.style.padding = '0';
              document.body.style.margin = '0';
              document.body.style.background = 'none';
            });
            await new Promise(r => setTimeout(r, 3000));
            const bannerEl = await page.$('.banner');
            await bannerEl.screenshot({path: 'banner.png', type: 'png'});
            await browser.close();
          })();
          JSEOF
          node capture.js
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install img2pdf
      - run: python3 -c "import img2pdf; open('banner.pdf','wb').write(img2pdf.convert('banner.png', layout_fun=img2pdf.get_layout_fun((img2pdf.mm_to_pt(850), img2pdf.mm_to_pt(2000)), fit=img2pdf.FitMode.into)))"
      - uses: actions/upload-artifact@v4
        with:
          name: banner-pdf
          path: banner.pdf
